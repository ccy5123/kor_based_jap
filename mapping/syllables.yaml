# Korean syllable -> Japanese kana mapping
# Naming convention: 청음 (voiceless), 탁음 (voiced), 반탁음 (semi-voiced)
# ㅐ-vowel syllables are derived dynamically (ㅔ-row + い), not listed here

# Bare vowels (ㅇ initial)
아: あ
이: い
우: う
에: え
오: お
어: お     # ㅓ → お (same row as ㅗ)
야: や
유: ゆ
요: よ
여: よ     # ㅕ ≈ ㅛ for our purposes
와: わ
위: ウィ   # ウィンドウ, ウィキ 등 외래어
웨: ウェ   # ウェブ 등
워: ウォ   # ウォーター 등

# k row (ㅋ -> 청음)
카: か
키: き
쿠: く
케: け
코: こ
캬: きゃ
큐: きゅ
쿄: きょ

# g row (ㄱ -> 탁음)
가: が
기: ぎ
구: ぐ
게: げ
고: ご
갸: ぎゃ
규: ぎゅ
교: ぎょ

# s row (ㅅ)
사: さ
시: し
스: す
세: せ
소: そ
샤: しゃ
슈: しゅ
쇼: しょ

# z/j row (ㅈ -> ざ row + じゃ row)
자: ざ
지: じ
즈: ず
제: ぜ
조: ぞ
쟈: じゃ
쥬: じゅ
죠: じょ

# t row (ㅌ; ち つ는 ㅊ로 분기)
타: た
테: て
토: と
티: ティ   # extended for foreign
투: トゥ   # extended for foreign

# d row (ㄷ; ぢ づ는 디/드 직접 입력, 두는 ドゥ)
다: だ
디: ぢ
드: づ
데: で
도: ど
두: ドゥ   # extended for foreign

# ch/ts row (ㅊ -> ち행)
차: ちゃ
치: ち
츠: つ
체: ちぇ
초: ちょ
추: ちゅ
챠: ちゃ
츄: ちゅ
쵸: ちょ

# n row (ㄴ)
나: な
니: に
누: ぬ
네: ね
노: の
냐: にゃ
뉴: にゅ
뇨: にょ

# h row (ㅎ -> は행)
하: は
히: ひ
후: ふ
헤: へ
호: ほ
햐: ひゃ
휴: ひゅ
효: ひょ

# b row (ㅂ -> ば행)
바: ば
비: び
부: ぶ
베: べ
보: ぼ
뱌: びゃ
뷰: びゅ
뵤: びょ

# p row (ㅍ -> ぱ행)
파: ぱ
피: ぴ
푸: ぷ
페: ぺ
포: ぽ
퍄: ぴゃ
퓨: ぴゅ
표: ぴょ

# m row (ㅁ)
마: ま
미: み
무: む
메: め
모: も
먀: みゃ
뮤: みゅ
묘: みょ

# r row (ㄹ -> ら행)
라: ら
리: り
루: る
레: れ
로: ろ
랴: りゃ
류: りゅ
료: りょ

# ㅡ vowel rounding — Korean ㅡ has no Japanese vowel equivalent, but users
# commonly transliterate ㅡ as う (e.g. 크リス, 트럭).  Each consonant + ㅡ maps
# to the corresponding う-row kana.
으: う
그: ぐ
크: く
느: ぬ
트: と     # 트럭→トラック convention; foreign-loanword トゥ stays via 투
르: る
므: む
브: ぶ
프: ぷ
흐: ふ
# (스, 즈, 츠, 드 are listed in their respective rows above)

# ㅕ syllables — Korean ㅕ has no Japanese vowel of its own, but in user
# transliteration it functions like ㅛ (e.g. 시경 → しぎょん).  So each
# consonant + ㅕ maps to the same kana as that consonant + ㅛ.
켜: きょ
겨: ぎょ
셔: しょ
져: じょ
쳐: ちょ
녀: にょ
혀: ひょ
벼: びょ
펴: ぴょ
며: みょ
려: りょ

# ㅓ syllables — ㅓ rounds to お, so each consonant + ㅓ maps to the same kana
# as that consonant + ㅗ.
거: ご
커: こ
서: そ
저: ぞ
처: ちょ
너: の
더: ど
터: と
허: ほ
버: ぼ
퍼: ぽ
머: も
러: ろ

# 된소리 alternates (사용자 표기 관습 흡수)
쓰: つ
삐: ぴ
