name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature ideas welcome.  The best requests describe the WHY --
        the user flow you want -- not just the HOW (implementation).

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the situation you're in when the current IME falls
        short.  Example -- "I often want to convert a committed word
        back into hiragana without deleting + retyping."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Your idea for how KorJpnIme could address the problem.
        Doesn't have to be concrete code -- a UX sketch is fine.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought of and why the
                   proposed one seems best.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Anything else -- links to how other IMEs handle this, related
        issues, examples from your own workflow.
